name: Pre validate PR

on:
  pull_request:
    branches: ['dev', 'main']

jobs:
  validate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Setup pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: pnpm install
        run: pnpm install

      - name: lint
        run: pnpm lint

      - name: compile
        run: pnpm build

      - name: test
        run: pnpm test

      - name: install semgrep
        run: pip install semgrep

      - name: scan with semgrep
        run: semgrep scan --config=auto
